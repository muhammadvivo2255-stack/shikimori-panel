<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIKIMORI STORE | DASHBOARD ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --pink-shiki: #ffb7c5; --bg-dark: #0d0d0f; --card: #1a1a1e; --gold: #ffd700; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; padding-top: 60px; }
        
        /* Sidebar/Navbar */
        .sidebar { background: var(--pink-shiki); border-right: 2px solid #f8a5b5; height: 100vh; position: fixed; top: 0; left: 0; padding: 20px 10px; width: 220px; z-index: 1000; }
        .nav-link { color: black !important; font-weight: bold; border-radius: 10px; padding: 12px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: white; color: black !important; }

        /* Main Content */
        .main-content { margin-left: 240px; padding: 20px; }
        @media (max-width: 768px) { .sidebar { width: 100px; } .main-content { margin-left: 110px; } .nav-link span { display: none; } }

        /* Cards */
        .card-shiki { background: var(--card); border: 1px solid #2d2d33; border-radius: 18px; padding: 22px; margin-bottom: 25px; }
        .stat-card { text-align: center; }
        .form-control, .form-select { background: #000 !important; color: white !important; border: 1px solid #444 !important; border-radius: 12px; }

        /* Game List */
        .game-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 15px 0; }
        .btn-add { background: var(--pink-shiki); color: black; font-weight: bold; border-radius: 10px; border: none; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <h5 class="fw-bold mb-4 text-center">SHIKIMORI ADMIN</h5>
        <a href="#" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> <span>Dashboard</span></a>
        <a href="#" class="nav-link"><i class="bi bi-search me-2"></i> <span>Daftar Order</span></a>
        <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#addGameModal"><i class="bi bi-plus-circle-fill me-2"></i> <span>Tambah Game</span></a>
        <hr class="border-black">
        <a href="javascript:logout()" class="nav-link text-danger mt-auto"><i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span></a>
    </div>

    <div class="main-content">
        <h2 class="fw-bold mb-4">Control Penuh Sepuh <span class="badge badge-admin bg-warning text-black ms-2 fs-6">ADMIN PREMIUM</span></h2>
        
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card-shiki stat-card">
                    <i class="bi bi-cart-fill fs-2" style="color: var(--pink-shiki);"></i>
                    <h5 class="mt-2 mb-0">971 Order</h5>
                    <p class="small text-muted mb-0">Total</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-shiki stat-card">
                    <i class="bi bi-cash-stack fs-2" style="color: #00ff88;"></i>
                    <h5 class="mt-2 mb-0">Rp 12,8 Juta</h5>
                    <p class="small text-muted mb-0">Omset</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-shiki stat-card">
                    <i class="bi bi-controller fs-2" style="color: #00ff88;"></i>
                    <h5 class="mt-2 mb-0">7 Game</h5>
                    <p class="small text-muted mb-0">Aktif</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-shiki stat-card">
                    <i class="bi bi-people fs-2" style="color: var(--pink-shiki);"></i>
                    <h5 class="mt-2 mb-0">18 Member</h5>
                    <p class="small text-muted mb-0">Premium</p>
                </div>
            </div>
        </div>

        <div class="card-shiki">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5><i class="bi bi-controller me-2"></i> Kelola Game & Diamond</h5>
                <button class="btn-add btn-sm" data-bs-toggle="modal" data-bs-target="#addGameModal">TAMBAH GAME <i class="bi bi-plus-circle"></i></button>
            </div>
            <div id="gameList">
                </div>
        </div>
    </div>

    <div class="modal fade" id="addGameModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Tambah Game Baru 🌸</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="newGameName" class="form-control mb-3" placeholder="Nama Game (Contoh: Valorant)">
                    <textarea id="newGameDm" class="form-control mb-3" rows="4" placeholder="Keterangan Diamond (Contoh: 125 Point: 15.000, 420 Point: 50.000) - Pisahkan dengan koma"></textarea>
                    <button class="btn btn-primary w-100 fw-bold py-3" onclick="saveNewGame()" style="background: var(--pink-shiki); border: none; color: black;">SIMPAN GAME BARU ⚡</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Cek Login Wajib
        if (localStorage.getItem('admin_login') !== 'true') { window.location.href = "login.html"; }

        function logout() { localStorage.removeItem('admin_login'); window.location.href = "login.html"; }

        // Fitur Database Palsu (Local Storage)
        function loadGames() {
            const games = JSON.parse(localStorage.getItem('shikimori_games')) || [];
            let html = "";
            
            // Masukin data statis default
            games.unshift({name: "Mobile Legends", dm: "5 Diamond: 1.500, 86 Diamond: 20.000"});
            games.unshift({name: "Free Fire", dm: "50 Diamond: 7.000, 100 Diamond: 14.000"});

            games.forEach((game, index) => {
                html += `
                    <div class="game-item">
                        <div>
                            <b>${game.name}</b><br>
                            <small class="text-white-50 text-wrap">${game.dm}</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-warning btn-sm">EDIT</button>
                            <button class="btn btn-outline-danger btn-sm" onclick="alert('Ini fitur hapus tapi cuma data dummy dulu 🤧')">HAPUS</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('gameList').innerHTML = html;
        }

        function saveNewGame() {
            const name = document.getElementById('newGameName').value;
            const dm = document.getElementById('newGameDm').value;
            
            if(!name || !dm) return alert("Waduh, Data game belum diisi full Sepuh! 🤧");

            let currentGames = JSON.parse(localStorage.getItem('shikimori_games')) || [];
            currentGames.push({name: name, dm: dm});
            localStorage.setItem('shikimori_games', JSON.stringify(currentGames));

            alert("Game " + name + " berhasil ditambahkan! GG Gacor.");
            loadGames(); // Tarik ulang listnya
            bootstrap.Modal.getInstance(document.getElementById('addGameModal')).hide();
        }

        loadGames(); // Jalankan pas web dibuka
    </script>
</body>
</html>
